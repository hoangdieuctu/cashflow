{% extends "base.html" %}
{% block page_title %}Upload Statement{% endblock %}

{% block content %}
<div style="max-width: 560px; margin: 1.5rem auto 0;">
    <div class="card" style="padding: 2rem;">
        <form method="post" enctype="multipart/form-data" id="uploadForm">
            <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="up-icon" id="uploadIcon"><i class="bi bi-cloud-arrow-up-fill"></i></div>
                <h6 id="uploadTitle">Drop PDFs here or click to browse</h6>
                <p id="uploadHint">Credit card or bank account statements · multiple files supported</p>
                <div id="fileList" style="display:none; margin-top: 0.6rem; width: 100%; text-align: left;"></div>
            </div>
            <input type="file" name="pdf_file" id="fileInput" accept=".pdf" class="d-none" multiple>

            <div class="input-group input-group-sm mt-3">
                <span class="input-group-text" style="border-radius: 8px 0 0 8px; border-color: #E2E8F0; background: #F8FAFC;">
                    <i class="bi bi-lock" style="color: #94A3B8; font-size: 0.8rem;"></i>
                </span>
                <input type="password" class="form-control" name="password" placeholder="PDF password (if required)" style="border-radius: 0 8px 8px 0; border-color: #E2E8F0; font-size: 0.82rem;">
            </div>

            <button type="submit" class="btn upload-btn w-100 mt-3" id="submitBtn" disabled>
                <i class="bi bi-lightning-fill me-1"></i> <span id="submitLabel">Parse & Import</span>
            </button>

            <div class="d-flex gap-3 justify-content-center mt-2" style="color: #94A3B8; font-size: 0.72rem;">
                <span><i class="bi bi-table me-1"></i>Auto-extract tables</span>
                <span><i class="bi bi-translate me-1"></i>Vietnamese</span>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');
const uploadTitle = document.getElementById('uploadTitle');
const uploadHint = document.getElementById('uploadHint');
const uploadIcon = document.getElementById('uploadIcon');
const submitBtn = document.getElementById('submitBtn');
const submitLabel = document.getElementById('submitLabel');

function guessType(name) {
    const lower = name.toLowerCase();
    if (lower.startsWith('saoke') || lower.includes('sao_ke') || lower.includes('bank_statement')) {
        return 'bank_account';
    }
    return 'credit_card';
}

function renderFiles(files) {
    if (!files.length) {
        fileList.style.display = 'none';
        dropZone.classList.remove('has-file');
        uploadIcon.innerHTML = '<i class="bi bi-cloud-arrow-up-fill"></i>';
        uploadTitle.textContent = 'Drop PDFs here or click to browse';
        uploadHint.textContent = 'Credit card or bank account statements · multiple files supported';
        submitBtn.disabled = true;
        submitLabel.textContent = 'Parse & Import';
        return;
    }

    dropZone.classList.add('has-file');
    uploadIcon.innerHTML = '<i class="bi bi-file-earmark-check-fill"></i>';
    uploadTitle.textContent = files.length === 1 ? '1 file selected' : files.length + ' files selected';
    uploadHint.textContent = 'Click to change';
    submitBtn.disabled = false;
    submitLabel.textContent = files.length === 1 ? 'Parse & Import' : 'Parse & Import All (' + files.length + ')';

    fileList.style.display = 'flex';
    fileList.style.flexDirection = 'column';
    fileList.style.gap = '0.35rem';
    fileList.innerHTML = '';

    Array.from(files).forEach(f => {
        const type = guessType(f.name);
        const badge = type === 'bank_account'
            ? '<span style="font-size:0.7rem;font-weight:700;padding:0.15rem 0.45rem;border-radius:5px;background:#EFF6FF;color:#2563EB;"><i class="bi bi-bank me-1"></i>Debit</span>'
            : '<span style="font-size:0.7rem;font-weight:700;padding:0.15rem 0.45rem;border-radius:5px;background:#FEF2F2;color:#E4002B;"><i class="bi bi-credit-card me-1"></i>Credit</span>';
        const tag = document.createElement('div');
        tag.style.cssText = 'display:flex;align-items:center;gap:0.5rem;background:#fff;border:1px solid #E2E8F0;border-radius:8px;padding:0.35rem 0.7rem;font-size:0.8rem;font-weight:600;color:var(--tcb-navy);';
        tag.innerHTML = `<i class="bi bi-file-earmark-pdf-fill" style="color:var(--tcb-red);flex-shrink:0;"></i><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.name}</span>${badge}`;
        fileList.appendChild(tag);
    });
}

fileInput.addEventListener('change', function() { renderFiles(this.files); });

['dragenter','dragover'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('dragover'); }));
['dragleave','drop'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove('dragover'); }));
dropZone.addEventListener('drop', ev => {
    const pdfs = Array.from(ev.dataTransfer.files).filter(f => f.name.toLowerCase().endsWith('.pdf'));
    if (pdfs.length) {
        // Use DataTransfer to set multiple files on input
        const dt = new DataTransfer();
        pdfs.forEach(f => dt.items.add(f));
        fileInput.files = dt.files;
        renderFiles(fileInput.files);
    }
});

document.getElementById('uploadForm').addEventListener('submit', function() {
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Parsing...';
});
</script>
{% endblock %}
