{% extends "base.html" %}
{% block page_title %}Settings{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="card">
            <div class="card-header-custom">
                <h6><i class="bi bi-shield-lock-fill me-2" style="color:#7C3AED;"></i>Passcode Lock</h6>
                <span id="statusBadge" style="font-size:0.72rem;font-weight:700;padding:0.2rem 0.6rem;border-radius:6px;
                    background:{% if passcode_enabled %}#D1FAE5{% else %}#F1F5F9{% endif %};
                    color:{% if passcode_enabled %}#059669{% else %}#64748B{% endif %};">
                    {% if passcode_enabled %}Enabled{% else %}Disabled{% endif %}
                </span>
            </div>
            <div style="padding:1.5rem 1.25rem;">
                <p style="font-size:0.85rem;color:#64748B;margin-bottom:1.5rem;">
                    Protect the app with a 6-digit numeric passcode. After 5 minutes of inactivity the lock screen will appear.
                </p>

                <!-- State: disabled, no passcode set yet -->
                <div id="stateDisabledNoCode" {% if passcode_enabled or has_passcode %}style="display:none"{% endif %}>
                    <button class="btn btn-primary w-100" onclick="showPanel('setNew')" style="background:linear-gradient(135deg,#7C3AED,#6D28D9);border:none;border-radius:10px;font-weight:700;padding:0.65rem;">
                        <i class="bi bi-lock-fill me-2"></i>Set up Passcode
                    </button>
                </div>

                <!-- State: disabled, has passcode -->
                <div id="stateDisabledHasCode" {% if passcode_enabled or not has_passcode %}style="display:none"{% endif %}>
                    <div class="d-flex gap-2">
                        <button class="btn w-100" onclick="showPanel('enableExisting')" style="background:linear-gradient(135deg,#7C3AED,#6D28D9);border:none;color:#fff;border-radius:10px;font-weight:700;padding:0.65rem;">
                            <i class="bi bi-lock-fill me-2"></i>Enable Lock
                        </button>
                        <button class="btn w-100" onclick="showPanel('change')" style="background:#F1F5F9;border:none;color:#334155;border-radius:10px;font-weight:700;padding:0.65rem;">
                            <i class="bi bi-pencil-fill me-2"></i>Change
                        </button>
                    </div>
                </div>

                <!-- State: enabled -->
                <div id="stateEnabled" {% if not passcode_enabled %}style="display:none"{% endif %}>
                    <div class="d-flex gap-2">
                        <button class="btn w-100" onclick="showPanel('disable')" style="background:#FEF2F2;border:none;color:#DC2626;border-radius:10px;font-weight:700;padding:0.65rem;">
                            <i class="bi bi-unlock-fill me-2"></i>Disable Lock
                        </button>
                        <button class="btn w-100" onclick="showPanel('change')" style="background:#F1F5F9;border:none;color:#334155;border-radius:10px;font-weight:700;padding:0.65rem;">
                            <i class="bi bi-pencil-fill me-2"></i>Change
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Keypad Modal -->
<div id="keypadOverlay" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,0.7);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:#1E293B;border-radius:24px;padding:2rem 1.5rem;width:100%;max-width:300px;display:flex;flex-direction:column;align-items:center;gap:1.25rem;">

        <div id="kpTitle" style="color:#fff;font-size:1rem;font-weight:700;text-align:center;"></div>
        <div id="kpSubtitle" style="color:#94A3B8;font-size:0.78rem;text-align:center;margin-top:-0.75rem;"></div>

        <!-- Dots -->
        <div id="kpDots" style="display:flex;gap:0.75rem;">
            <div class="kp-dot"></div>
            <div class="kp-dot"></div>
            <div class="kp-dot"></div>
            <div class="kp-dot"></div>
            <div class="kp-dot"></div>
            <div class="kp-dot"></div>
        </div>

        <div id="kpError" style="color:#F87171;font-size:0.78rem;font-weight:600;height:1em;text-align:center;"></div>

        <!-- Keypad -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.65rem;width:100%;">
            <button class="kp-key" data-n="1">1<span class="kp-sub">&nbsp;</span></button>
            <button class="kp-key" data-n="2">2<span class="kp-sub">ABC</span></button>
            <button class="kp-key" data-n="3">3<span class="kp-sub">DEF</span></button>
            <button class="kp-key" data-n="4">4<span class="kp-sub">GHI</span></button>
            <button class="kp-key" data-n="5">5<span class="kp-sub">JKL</span></button>
            <button class="kp-key" data-n="6">6<span class="kp-sub">MNO</span></button>
            <button class="kp-key" data-n="7">7<span class="kp-sub">PQRS</span></button>
            <button class="kp-key" data-n="8">8<span class="kp-sub">TUV</span></button>
            <button class="kp-key" data-n="9">9<span class="kp-sub">WXYZ</span></button>
            <button class="kp-key kp-empty" style="opacity:0;pointer-events:none;"></button>
            <button class="kp-key" data-n="0">0<span class="kp-sub">&nbsp;</span></button>
            <button class="kp-key kp-del" id="kpDel">⌫</button>
        </div>

        <button onclick="closePanel()" style="background:transparent;border:none;color:#64748B;font-size:0.8rem;font-weight:600;cursor:pointer;padding:0.25rem 1rem;">Cancel</button>
    </div>
</div>

<style>
.kp-dot {
    width:13px;height:13px;border-radius:50%;
    border:2px solid rgba(255,255,255,0.35);
    background:transparent;
    transition:background 0.12s,border-color 0.12s,transform 0.08s;
}
.kp-dot.filled { background:#fff;border-color:#fff;transform:scale(1.1); }
.kp-dot.error { background:#E4002B;border-color:#E4002B; }
.kp-key {
    aspect-ratio:1;border-radius:50%;border:none;
    background:rgba(255,255,255,0.1);color:#fff;
    font-size:1.3rem;font-weight:600;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    transition:background 0.1s,transform 0.08s;
    user-select:none;line-height:1;
}
.kp-key:hover { background:rgba(255,255,255,0.18); }
.kp-key:active { background:rgba(255,255,255,0.28);transform:scale(0.92); }
.kp-sub { font-size:0.42rem;letter-spacing:1.5px;font-weight:700;color:rgba(255,255,255,0.45);text-transform:uppercase;margin-top:2px; }
.kp-del { background:transparent;font-size:1.1rem; }
.kp-del:hover { background:rgba(255,255,255,0.08); }
@keyframes kpShake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)}
}
.kp-shake { animation:kpShake 0.38s ease; }
</style>

<script>
// ── Panel state machine ──────────────────────────────────────────────
// Panels: 'setNew' | 'enableExisting' | 'disable' | 'change'
// Each panel is a sequence of steps (each step = one keypad entry)

let currentPanel = null;
let steps = [];       // list of {title, subtitle, key} — key stored per step
let stepIndex = 0;
let stepValues = {};  // key → entered code

function showPanel(panel) {
    currentPanel = panel;
    stepValues = {};
    if (panel === 'setNew') {
        steps = [
            { title: 'Set New Passcode',    subtitle: 'Enter a 6-digit passcode', key: 'new' },
            { title: 'Confirm Passcode',    subtitle: 'Re-enter to confirm',       key: 'confirm' },
        ];
    } else if (panel === 'enableExisting') {
        steps = [
            { title: 'Enable Lock',  subtitle: 'Enter your passcode to enable', key: 'current' },
        ];
    } else if (panel === 'disable') {
        steps = [
            { title: 'Disable Lock', subtitle: 'Enter your passcode to disable', key: 'current' },
        ];
    } else if (panel === 'change') {
        steps = [
            { title: 'Current Passcode', subtitle: 'Enter your current passcode', key: 'current' },
            { title: 'New Passcode',      subtitle: 'Enter a new 6-digit passcode', key: 'new' },
            { title: 'Confirm New',       subtitle: 'Re-enter the new passcode',    key: 'confirm' },
        ];
    }
    stepIndex = 0;
    openStep();
}

function openStep() {
    const step = steps[stepIndex];
    document.getElementById('kpTitle').textContent = step.title;
    document.getElementById('kpSubtitle').textContent = step.subtitle;
    document.getElementById('kpError').textContent = '';
    resetDots();
    code = '';
    document.getElementById('keypadOverlay').style.display = 'flex';
}

function closePanel() {
    document.getElementById('keypadOverlay').style.display = 'none';
    code = '';
}

// ── Keypad logic ─────────────────────────────────────────────────────
const MAX_LEN = 6;
let code = '';

function updateDots() {
    const dots = document.querySelectorAll('.kp-dot');
    dots.forEach((d, i) => {
        d.classList.toggle('filled', i < code.length);
        d.classList.remove('error');
    });
}

function resetDots() {
    document.querySelectorAll('.kp-dot').forEach(d => {
        d.classList.remove('filled', 'error');
    });
}

function shakeAndClear(msg) {
    const dotsWrap = document.getElementById('kpDots');
    document.querySelectorAll('.kp-dot').forEach(d => d.classList.add('error'));
    document.getElementById('kpError').textContent = msg;
    dotsWrap.classList.add('kp-shake');
    setTimeout(() => {
        dotsWrap.classList.remove('kp-shake');
        resetDots();
        code = '';
    }, 500);
}

async function onCodeComplete() {
    const step = steps[stepIndex];
    stepValues[step.key] = code;

    // Confirm step: check match
    if (step.key === 'confirm') {
        if (stepValues['confirm'] !== stepValues['new']) {
            shakeAndClear('Passcodes do not match');
            return;
        }
    }

    // If more steps, advance
    if (stepIndex < steps.length - 1) {
        stepIndex++;
        code = '';
        openStep();
        return;
    }

    // All steps done — call API
    closePanel();
    await submitAction();
}

async function submitAction() {
    let body = { action: currentPanel === 'setNew' ? 'enable' : currentPanel === 'enableExisting' ? 'enable' : currentPanel };
    if (stepValues.new)     body.passcode = stepValues.new;
    if (stepValues.current) body.current_passcode = stepValues.current;
    if (currentPanel === 'enableExisting') body.passcode = stepValues.current;

    const resp = await fetch('/api/settings/passcode', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (!resp.ok) {
        // Re-open at the failed step with error
        showPanel(currentPanel);
        setTimeout(() => shakeAndClear(data.error || 'Error'), 50);
        return;
    }
    // Reload to reflect new state
    location.reload();
}

document.querySelectorAll('.kp-key[data-n]').forEach(btn => {
    btn.addEventListener('click', () => {
        if (code.length >= MAX_LEN) return;
        code += btn.dataset.n;
        updateDots();
        if (code.length === MAX_LEN) setTimeout(onCodeComplete, 120);
    });
});

document.getElementById('kpDel').addEventListener('click', () => {
    code = code.slice(0, -1);
    updateDots();
});

document.addEventListener('keydown', e => {
    if (!document.getElementById('keypadOverlay').style.display || document.getElementById('keypadOverlay').style.display === 'none') return;
    if (e.key >= '0' && e.key <= '9' && code.length < MAX_LEN) {
        code += e.key;
        updateDots();
        if (code.length === MAX_LEN) setTimeout(onCodeComplete, 120);
    } else if (e.key === 'Backspace') {
        code = code.slice(0, -1);
        updateDots();
    } else if (e.key === 'Escape') {
        closePanel();
    }
});
</script>
{% endblock %}
