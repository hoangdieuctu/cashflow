<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashflow · Locked</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }

        body {
            min-height: 100vh;
            background: linear-gradient(160deg, #0F172A 0%, #1E1B4B 50%, #0F172A 100%);
            display: flex; align-items: center; justify-content: center;
        }

        .lock-wrap {
            display: flex; flex-direction: column; align-items: center;
            gap: 2rem; padding: 2rem 1rem;
            width: 100%; max-width: 320px;
        }

        /* Brand */
        .brand {
            display: flex; flex-direction: column; align-items: center; gap: 0.6rem;
        }
        .brand-icon {
            width: 56px; height: 56px; border-radius: 16px;
            background: linear-gradient(135deg, #E4002B, #FF4D6D);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; color: #fff;
            box-shadow: 0 8px 24px rgba(228,0,43,0.4);
        }
        .brand h1 { color: #fff; font-size: 1.4rem; font-weight: 800; }
        .brand p { color: #94A3B8; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.5px; }

        /* Dots */
        .dots {
            display: flex; gap: 1rem; align-items: center; height: 20px;
        }
        .dot {
            width: 14px; height: 14px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4);
            background: transparent;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
        }
        .dot.filled {
            background: #fff;
            border-color: #fff;
            transform: scale(1.1);
        }
        .dot.error {
            border-color: #E4002B;
            background: #E4002B;
        }

        /* Error msg */
        .error-msg {
            color: #F87171;
            font-size: 0.8rem;
            font-weight: 600;
            height: 1.2em;
            text-align: center;
        }

        /* Password input */
        .passcode-input {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1.5px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 1.5rem;
            letter-spacing: 0.4em;
            text-align: center;
            padding: 0.7rem 1rem;
            outline: none;
            transition: border-color 0.15s;
        }
        .passcode-input:focus { border-color: rgba(255,255,255,0.5); }
        .passcode-input::placeholder { letter-spacing: normal; font-size: 0.9rem; color: rgba(255,255,255,0.3); }

        /* Shake animation on error */
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }
        .dots.shake { animation: shake 0.4s ease; }
    </style>
</head>
<body>
<div class="lock-wrap">
    <div class="brand">
        <div class="brand-icon">&#x1F4B5;</div>
        <h1>Cashflow</h1>
        <p>Enter passcode to continue</p>
    </div>

    <div class="dots" id="dots">
        <div class="dot {% if error %}error{% endif %}" id="d0"></div>
        <div class="dot {% if error %}error{% endif %}" id="d1"></div>
        <div class="dot {% if error %}error{% endif %}" id="d2"></div>
        <div class="dot {% if error %}error{% endif %}" id="d3"></div>
        <div class="dot {% if error %}error{% endif %}" id="d4"></div>
        <div class="dot {% if error %}error{% endif %}" id="d5"></div>
    </div>

    <div class="error-msg" id="errMsg">{% if error %}Incorrect passcode{% endif %}</div>

    <form id="lockForm" method="POST" action="{{ url_for('main.lock', next=request.args.get('next', '')) }}">
        <input type="password" name="passcode" id="passcodeInput"
               class="passcode-input" maxlength="6" inputmode="numeric"
               pattern="[0-9]*" autocomplete="current-password"
               placeholder="Enter passcode" autofocus>
    </form>
</div>

<script>
    const input = document.getElementById('passcodeInput');
    const dots = document.querySelectorAll('.dot');
    const dotsWrap = document.getElementById('dots');
    const errMsg = document.getElementById('errMsg');

    {% if error %}
    setTimeout(() => {
        dotsWrap.classList.add('shake');
        setTimeout(() => {
            dots.forEach(d => { d.classList.remove('error', 'filled'); });
            dotsWrap.classList.remove('shake');
            errMsg.textContent = '';
        }, 600);
    }, 10);
    {% endif %}

    function updateDots() {
        const len = input.value.length;
        dots.forEach((d, i) => {
            d.classList.toggle('filled', i < len);
            d.classList.remove('error');
        });
    }

    input.addEventListener('input', () => {
        // Strip non-digits
        input.value = input.value.replace(/\D/g, '').slice(0, 6);
        updateDots();
        if (input.value.length === 6) {
            setTimeout(() => input.closest('form').submit(), 120);
        }
    });
</script>
</body>
</html>
